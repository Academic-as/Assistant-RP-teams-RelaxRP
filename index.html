<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Начальная вкладка - Помощник RP-команд</title>
    <link rel="icon" type="image/x-icon" href="Academic.png">
    <style>
        :root {
            --bg: #070314;
            --panel: rgba(15, 7, 38, 0.92);
            --text: #f3f4f6;
            --muted: #9ca3af;
            --accent: #a855f7;
            --accent-2: #7c3aed;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 15% 20%, rgba(168, 85, 247, 0.2), transparent 30%),
                        radial-gradient(circle at 85% 15%, rgba(99, 102, 241, 0.14), transparent 24%),
                        linear-gradient(180deg, #05030f 0%, #090519 100%);
            color: var(--text);
            padding: 2rem 1rem;
        }

        .hero {
            width: min(100%, 560px);
            background: rgba(15, 7, 38, 0.94);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 3rem 2.2rem;
            text-align: center;
            box-shadow: 0 36px 90px rgba(0,0,0,0.32);
        }

        .hero img {
            width: 92px;
            height: 92px;
            margin: 0 auto 1.6rem;
            border-radius: 24px;
            display: block;
            background: rgba(255,255,255,0.08);
            padding: 1rem;
        }

        h1 {
            font-size: 2.35rem;
            margin-bottom: 0.8rem;
            line-height: 1.05;
            letter-spacing: -0.02em;
        }

        .hero p {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.85;
            margin: 0 auto 1rem;
            max-width: 40rem;
        }

        .hero .hero-note {
            color: #c7bef6;
            margin-bottom: 1.4rem;
            letter-spacing: 0.01em;
        }

        .hero p + .link {
            margin-top: 0.4rem;
            display: inline-block;
        }

        .btn {
            display: inline-block;
            padding: 1rem 1.6rem;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 14px 36px rgba(124, 58, 237, 0.24);
        }

        .hero a.link {
            color: #b5a5ff;
            text-decoration: none;
            font-weight: 600;
        }

        .btn {
            display: inline-block;
            padding: 0.9rem 1.4rem;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 12px 30px rgba(124, 58, 237, 0.25);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 36px rgba(124, 58, 237, 0.35);
        }
    </style>
</head>
<body>
    <main class="hero">
        <img src="Academic.png" alt="Academic logo">
        <h1>Помощник</h1>
        <p>Стартовая страница для быстрого доступа к шаблонам и справочной информации по SCP для RelaxRP.</p>
        <p class="hero-note">Данное приложение не является официальным продуктом RelaxRP. Оно было создано сторонним разработчиком</p>
        <p><a class="link" href="https://discord.com/users/534028333982285842" target="_blank" rel="noopener noreferrer">Academic (@academic_as)</a></p>
        <div style="display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem;">
            <a class="btn" href="app.html">Открыть шаблоны</a>
            <a class="btn" href="scp-info.html">Открыть SCP-справку</a>
        </div>
    </main>
</body>
</html>
